---
# pressctl — Server Configuration
# Edit this file to configure your WordPress hosting environment.
# Most defaults work well for small-to-medium sites; tune based on your server resources.

# ─────────────────────────────────────────────────────────────────────────────
# REQUIRED — set these before running any playbook
# ─────────────────────────────────────────────────────────────────────────────

# MySQL password for the pressctlbot admin user
mysql_pressctlbot_password: ''


# ─────────────────────────────────────────────────────────────────────────────
# STACK
# ─────────────────────────────────────────────────────────────────────────────

# Default PHP version installed on the server and used by all sites
# Changing this after provisioning requires re-running the php role
default_php_version: "8.3"

# Server timezone — must be a valid tz database name (e.g. "America/New_York", "Europe/London")
# Full list: https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
server_timezone: "UTC"


# ─────────────────────────────────────────────────────────────────────────────
# PHP
# ─────────────────────────────────────────────────────────────────────────────

php_memory_limit: "256M"
php_upload_max_filesize: "64M"
php_post_max_size: "64M"
php_max_execution_time: 300


# ─────────────────────────────────────────────────────────────────────────────
# DATABASE
# ─────────────────────────────────────────────────────────────────────────────

# InnoDB buffer pool — aim for 50–70% of total RAM on dedicated DB servers
mariadb_innodb_buffer_pool_size: "256M"
mariadb_max_connections: 100


# ─────────────────────────────────────────────────────────────────────────────
# INTERNAL — do not change
# ─────────────────────────────────────────────────────────────────────────────

ansible_managed: 'Managed by pressctl'
mysql_root_password: "{{ lookup('password', '/dev/null length=24 chars=ascii_letters,digits') }}"
