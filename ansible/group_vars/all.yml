---
# pressctl — Server Configuration
# Edit this file to configure your WordPress hosting environment.
# Most defaults work well for small-to-medium sites; tune based on your server resources.

# ─────────────────────────────────────────────────────────────────────────────
# REQUIRED — set these before running any playbook
# ─────────────────────────────────────────────────────────────────────────────

# MySQL password for the pressctlbot admin user
mysql_pressctlbot_password: ''


# ─────────────────────────────────────────────────────────────────────────────
# STACK
# ─────────────────────────────────────────────────────────────────────────────

# Default PHP version installed on the server and used by all sites
# Changing this after provisioning requires re-running the php role
php_version: "8.3"

# Server timezone — must be a valid tz database name (e.g. "America/New_York", "Europe/London")
# Full list: https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
server_timezone: "UTC"


# ─────────────────────────────────────────────────────────────────────────────
# PHP
# ─────────────────────────────────────────────────────────────────────────────

php_memory_limit: "256M"
php_upload_max_filesize: "64M"
php_post_max_size: "64M"
php_max_execution_time: 300
php_max_input_vars: 3000

# PHP-FPM process manager
php_fpm_pm: "ondemand"
php_fpm_max_children: 50
php_fpm_start_servers: 5
php_fpm_min_spare_servers: 5
php_fpm_max_spare_servers: 35

# Install development tools
php_install_composer: true
php_install_wpcli: true


# ─────────────────────────────────────────────────────────────────────────────
# DATABASE
# ─────────────────────────────────────────────────────────────────────────────

# InnoDB buffer pool — aim for 50–70% of total RAM on dedicated DB servers
mariadb_innodb_buffer_pool_size: "256M"
mariadb_max_connections: 100

# Disable performance_schema to reduce memory usage on small VPS
mariadb_performance_schema: false

# Binary logging (disable for single-server setups to save disk space)
# Enable if you need replication or point-in-time recovery
mariadb_binary_logging: false

# Character set and collation
mariadb_character_set: "utf8mb4"
mariadb_collation: "utf8mb4_unicode_ci"

# Query cache (deprecated in MySQL 8.0, but still available in MariaDB)
mariadb_query_cache_size: "0"

# Slow query log (useful for debugging, disable in production)
mariadb_slow_query_log: false
mariadb_long_query_time: 2


# ─────────────────────────────────────────────────────────────────────────────
# NGINX
# ─────────────────────────────────────────────────────────────────────────────

nginx_worker_connections: 8000


# ─────────────────────────────────────────────────────────────────────────────
# SECURITY
# ─────────────────────────────────────────────────────────────────────────────

# UFW firewall — ports to allow (TCP)
ufw_allowed_ports:
  - 22    # SSH
  - 80    # HTTP
  - 443   # HTTPS

# Default UFW policy for incoming connections
ufw_default_policy: "deny"

# SSH hardening
# Set to "no" to disable root login, "yes" to allow, or "prohibit-password" for key-only
ssh_permit_root_login: "prohibit-password"
ssh_password_authentication: "no"
ssh_pubkey_authentication: "yes"
ssh_max_auth_tries: 3
ssh_login_grace_time: 60


# ─────────────────────────────────────────────────────────────────────────────
# INTERNAL — do not change unless you know what you're doing
# ─────────────────────────────────────────────────────────────────────────────

ansible_managed: 'Managed by pressctl'
mysql_root_password: "{{ lookup('password', '/dev/null length=24 chars=ascii_letters,digits') }}"

nginx_repo_url: "http://nginx.org/packages/ubuntu {{ ansible_distribution_release }} nginx"

required_packages:
  - acl
  - gnupg
  - cron
  - fail2ban
  - locales
  - redis-server
  - software-properties-common
  - certbot
  - tzdata
  - unattended-upgrades
  - unzip

php_extensions:
  - bcmath
  - cli
  - common
  - curl
  - gd
  - igbinary
  - imagick
  - intl
  - mbstring
  - mysql
  - opcache
  - redis
  - soap
  - xml
  - zip
  - fpm

# PHP disabled functions for security
# These functions are commonly exploited in WordPress attacks
# Remove functions from this list only if your application requires them
php_disabled_functions:
  - disk_free_space
  - disk_total_space
  - diskfreespace
  - dl
  - exec
  - opcache_get_configuration
  - opcache_get_status
  - passthru
  - pclose
  - pcntl_alarm
  - pcntl_exec
  - pcntl_fork
  - pcntl_get_last_error
  - pcntl_getpriority
  - pcntl_setpriority
  - pcntl_signal
  - pcntl_signal_dispatch
  - pcntl_sigprocmask
  - pcntl_sigtimedwait
  - pcntl_sigwaitinfo
  - pcntl_strerror
  - pcntl_waitpid
  - pcntl_wait
  - pcntl_wexitstatus
  - pcntl_wifcontinued
  - pcntl_wifexited
  - pcntl_wifsignaled
  - pcntl_wifstopped
  - pcntl_wstopsig
  - pcntl_wtermsig
  - popen
  - posix_getpwuid
  - posix_kill
  - posix_mkfifo
  - posix_setpgid
  - posix_setsid
  - posix_setuid
  - posix_uname
  - proc_close
  - proc_get_status
  - proc_nice
  - proc_open
  - proc_terminate
  - shell_exec
  - show_source
  - system

# ImageMagick PDF policy (read|write allows PDF processing for WordPress)
imagemagick_pdf_policy: "read|write"
