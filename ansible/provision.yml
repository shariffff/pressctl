---
- name: Configure WordPress Hosting Server
  hosts: all:!localhost
  become: true
  gather_facts: true
  pre_tasks:
    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - mysql_pressctlbot_password is defined and mysql_pressctlbot_password | length > 0
        fail_msg: |
          Required variables are missing or empty. Please set:
            - mysql_pressctlbot_password: MySQL admin password
          Set these in group_vars/all.yml or pass via --extra-vars
  roles:
    - { role: bootstrap, tags: 'bootstrap' }
    - { role: database, tags: 'database' }
    - { role: nginx, tags: 'nginx' }
    - { role: php, tags: 'php' }
    - { role: security, tags: 'security' }
