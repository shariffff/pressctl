---
- name: Create sudo group
  ansible.builtin.group:
    name: sudo
    state: present

- name: Configure sudoers
  ansible.builtin.lineinfile:
    path: /etc/sudoers
    regexp: '^%sudo'
    line: '%sudo ALL=(ALL:ALL) ALL'
    validate: /usr/sbin/visudo -cf %s

- name: Create pressctl user
  ansible.builtin.user:
    name: pressctl
    groups: sudo
    shell: /bin/bash
    create_home: true
    state: present

- name: Ensure pressctl .ssh directory exists
  ansible.builtin.file:
    path: /home/pressctl/.ssh
    state: directory
    owner: pressctl
    group: pressctl
    mode: '0700'

- name: Copy root authorized_keys to pressctl user
  ansible.builtin.copy:
    src: /root/.ssh/authorized_keys
    dest: /home/pressctl/.ssh/authorized_keys
    owner: pressctl
    group: pressctl
    mode: '0600'
    remote_src: true

- name: Configure sudoers for pressctl
  ansible.builtin.copy:
    dest: /etc/sudoers.d/00-pressctl
    content: 'pressctl ALL=(ALL) NOPASSWD: ALL'
    mode: '0440'
    validate: /usr/sbin/visudo -cf %s
